name: Deploy to Production
run-name: "Production: ${{ github.event.head_commit.message }}"

on:
  workflow_dispatch:

concurrency:
  group: deploy-production-frontend
  cancel-in-progress: false

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show deploy info
        run: |
          COMMIT_MSG=$(git log -1 --format='%s')
          COMMIT_SHA=$(git log -1 --format='%h')
          echo "## Deploying to Production" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`$COMMIT_SHA\` — $COMMIT_MSG" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e

            echo "==> Adding GitHub to known hosts..."
            mkdir -p ~/.ssh
            ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

            cd /var/www/villakurdu/frontend

            echo "==> Pulling latest code..."
            export GIT_SSH_COMMAND="ssh -i /root/.ssh/villakurdu_frontend_deploy -o StrictHostKeyChecking=no"
            git fetch origin production
            git reset --hard origin/production

            echo "==> Installing dependencies..."
            npm ci

            echo "==> Building..."
            NEXT_PUBLIC_API_URL=https://api.villakurdu.com/api/v1 \
            NEXT_PUBLIC_APP_URL=https://villakurdu.com \
            npm run build

            echo "==> Restarting..."
            pm2 delete villakurdu-frontend 2>/dev/null || true
            pm2 start ecosystem.config.js --env production
            pm2 save

            echo "==> Deployment complete!"

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://villakurdu.com/tr)
          echo "Health check returned HTTP $STATUS"
          if [ "$STATUS" -ge 500 ] || [ "$STATUS" -eq 000 ]; then
            echo "Server error or unreachable — deployment may have failed"
            exit 1
          fi
          echo "Production health check passed!"
